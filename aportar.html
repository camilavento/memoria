<!-- aportar.html -->

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aportar memoria | Proyecto MEMORIA</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="content-page">

  <a class="back-button" href="index.html">← Volver al inicio</a>

  <main class="content-card">
    <div>
      <p class="eyebrow">Participación</p>
      <h1>¿Cómo subir una memoria?</h1>
      <p>
        Selecciona una persona detenida desaparecida desde la base del proyecto y sube fotografías,
        videos, audios, documentos o escritos para complementar su ficha conmemorativa.
      </p>
    </div>

    <form id="memoryForm" class="memory-form">
      <label>
        Buscar persona detenida desaparecida
        <input
          id="personSearch"
          type="text"
          placeholder="Escribe un nombre, comuna, ciudad o región..."
          autocomplete="off"
        >
      </label>

      <label>
        Persona detenida desaparecida
        <select id="personSelect" required>
          <option value="">Cargando base de datos...</option>
        </select>
      </label>

      <div id="selectedPersonInfo" class="selected-person-info" aria-live="polite"></div>

      <label>
        Tipo de aporte
        <select id="contributionType" required>
          <option value="Imagen">Imagen</option>
          <option value="Video">Video</option>
          <option value="Audio">Audio</option>
          <option value="Escrito">Escrito</option>
          <option value="Documento">Documento</option>
          <option value="Otro archivo">Otro archivo</option>
        </select>
      </label>

      <label>
        Archivos
        <input id="filesInput" type="file" multiple accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.txt">
      </label>

      <label>
        Mensaje o testimonio
        <textarea id="messageInput" placeholder="Escribe un recuerdo, contexto o testimonio..." required></textarea>
      </label>

      <label>
        Relación con la persona
        <select id="relationInput" required>
          <option value="Familiar">Familiar</option>
          <option value="Amistad">Amistad</option>
          <option value="Investigador/a">Investigador/a</option>
          <option value="Ciudadano/a">Ciudadano/a</option>
          <option value="Estudiante">Estudiante</option>
          <option value="Comunidad">Comunidad</option>
          <option value="Otro">Otro</option>
        </select>
      </label>

      <label class="checkbox-label">
        <input id="consentInput" type="checkbox" required>
        Confirmo que este aporte puede formar parte del memorial digital del proyecto.
      </label>

      <button type="submit">Construir memoria</button>
    </form>
  </main>

  <script src="aportar.js"></script>
</body>
</html>
