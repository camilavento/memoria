<!-- memorial.html -->

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memorial 3D | Proyecto MEMORIA</title>
  <link rel="stylesheet" href="style.css">

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>

<body class="memorial-page">

  <aside class="side-nav">
    <a href="aportar.html">Construir<br>memoria</a>
    <a href="proyecto.html">Sobre el<br>proyecto</a>
  </aside>

  <main class="memorial-main">
    <header class="viewer-toolbar">
      <button id="zoomOut" type="button">−</button>
      <button id="zoomIn" type="button">+</button>
      <button id="resetView" type="button">Reset</button>
      <span>Arrastra para mirar · WASD/flechas para moverte · Rueda para avanzar o retroceder · Click en un frame</span>
    </header>

    <div id="threeContainer" class="three-container"></div>
  </main>

  <section id="memoryModal" class="modal">
    <div class="modal-content">
      <button id="closeModal" class="close" type="button">×</button>
      <div id="modalMedia"></div>
      <h2 id="modalTitle"></h2>
      <p id="modalMeta"></p>
      <p id="modalMessage"></p>
      <ul id="modalFiles"></ul>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script type="module" src="memorial.js?v=free-camera-5"></script>
</body>
</html>
