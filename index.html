<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MEMORIA</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="toolbar">
  <button id="zoomIn">+</button>
  <button id="zoomOut">−</button>
  <button id="resetZoom">Reset</button>
</div>

<div class="stage" id="stage">
  <div class="word" id="word"></div>
</div>

<div class="upload-panel">
  <form id="memoryForm">
    <input type="text" id="name" placeholder="Nombre o título" required />
    <input type="file" id="image" accept="image/*" />
    <textarea id="message" placeholder="Escribe un mensaje..." required></textarea>
    <button type="submit">Construir memoria</button>
  </form>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close" id="closeModal">X</button>
    <img id="modalImage"/>
    <h2 id="modalTitle"></h2>
    <p id="modalMessage"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
